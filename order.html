<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Order Online | Hotel Amirtha Kangeyam</title>
    <meta name="description" content="Order delicious South Indian pure veg food online from Hotel Amirtha Kangeyam."/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #161311; color: #eae1dd; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .btn-glow { background: linear-gradient(135deg, #ffb5a0 0%, #ff5722 100%); }
    </style>
</head>
<body class="bg-background text-on-surface">
    <nav class="fixed top-0 w-full z-50 bg-stone-950/80 backdrop-blur-xl shadow-2xl">
        <div class="flex justify-between items-center px-8 py-4 max-w-full mx-auto">
            <a href="index.html" class="text-2xl font-serif font-bold text-orange-500 tracking-tighter">Hotel Amirtha</a>
            <div class="hidden md:flex gap-8 items-center">
                <a class="font-serif text-stone-300 hover:text-orange-200 uppercase tracking-widest text-sm" href="index.html">Home</a>
                <a class="font-serif text-stone-300 hover:text-orange-200 uppercase tracking-widest text-sm" href="stay.html">Rooms</a>
                <a class="font-serif text-stone-300 hover:text-orange-200 uppercase tracking-widest text-sm" href="dine.html">Restaurant</a>
                <a class="font-serif text-stone-300 hover:text-orange-200 uppercase tracking-widest text-sm" href="events.html">Party Hall</a>
                <a class="font-serif text-stone-300 hover:text-orange-200 uppercase tracking-widest text-sm" href="contact.html">Contact</a>
            </div>
            <div class="flex gap-4">
                <a href="order.html" class="px-6 py-2 btn-glow text-on-primary-container font-bold rounded-DEFAULT text-sm uppercase">Order Online</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 min-h-screen">
        <section class="py-16 px-8 max-w-4xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="font-serif text-4xl font-bold mb-4">Order via WhatsApp</h1>
                <p class="text-on-surface-variant">Select items below and click the button to send your order.</p>
            </div>

            <div id="menu-list" class="space-y-4">
                <!-- Item Card -->
                <div class="flex items-center justify-between p-6 bg-surface-container-low rounded-DEFAULT border border-outline-variant/10">
                    <div>
                        <h3 class="font-bold text-lg">South Indian Full Meal</h3>
                        <p class="text-sm text-tertiary">₹100</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" min="0" value="0" class="menu-qty w-16 bg-surface-container-highest border-none rounded text-center" data-name="Full Meal">
                    </div>
                </div>

                <div class="flex items-center justify-between p-6 bg-surface-container-low rounded-DEFAULT border border-outline-variant/10">
                    <div>
                        <h3 class="font-bold text-lg">Sambar Rice</h3>
                        <p class="text-sm text-tertiary">₹70</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" min="0" value="0" class="menu-qty w-16 bg-surface-container-highest border-none rounded text-center" data-name="Sambar Rice">
                    </div>
                </div>

                <div class="flex items-center justify-between p-6 bg-surface-container-low rounded-DEFAULT border border-outline-variant/10">
                    <div>
                        <h3 class="font-bold text-lg">Ghee Podi Dosa</h3>
                        <p class="text-sm text-tertiary">₹85</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" min="0" value="0" class="menu-qty w-16 bg-surface-container-highest border-none rounded text-center" data-name="Ghee Podi Dosa">
                    </div>
                </div>

                <div class="flex items-center justify-between p-6 bg-surface-container-low rounded-DEFAULT border border-outline-variant/10">
                    <div>
                        <h3 class="font-bold text-lg">Idli (Set of 2)</h3>
                        <p class="text-sm text-tertiary">₹40</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" min="0" value="0" class="menu-qty w-16 bg-surface-container-highest border-none rounded text-center" data-name="Idli Set">
                    </div>
                </div>
            </div>

            <div class="mt-12 sticky bottom-8">
                <button onclick="sendOrder()" class="w-full btn-glow text-on-primary-container font-bold py-5 rounded-DEFAULT uppercase flex items-center justify-center gap-3 shadow-2xl">
                    <span class="material-symbols-outlined">chat</span>
                    Send Order via WhatsApp
                </button>
            </div>
        </section>
    </main>

    <footer class="bg-stone-950 px-12 py-12 border-t border-stone-800">
        <div class="max-w-7xl mx-auto text-center text-stone-500 text-sm">
            <p>© 2024 Hotel Amirtha Kangeyam</p>
        </div>
    </footer>

    <script>
        function sendOrder() {
            const inputs = document.querySelectorAll('.menu-qty');
            let orderText = "Hello Hotel Amirtha, I'd like to order food:%0A%0A";
            let hasItems = false;

            inputs.forEach(input => {
                const qty = parseInt(input.value);
                if (qty > 0) {
                    orderText += `- ${input.getAttribute('data-name')} x ${qty}%0A`;
                    hasItems = true;
                }
            });

            if (!hasItems) {
                alert("Please select at least one item.");
                return;
            }

            window.open(`https://wa.me/918438435005?text=${orderText}`, '_blank');
        }
    </script>
</body>
</html>
